<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Control Remoto</title>
  <style>
    :root {
      --bg-body: #000000;
      --bg-btn: #0a0a0d;
      --bg-active: #3a3a3f;
      --color-idle: rgba(255, 255, 255, 0.32);
      --color-active: rgba(255, 255, 255, 0.85);
      --border-btn: 1px solid rgba(255, 255, 255, 0.05);
      --accent: #3b82f6;
      --accent-dim: rgba(59, 130, 246, 0.16);
      --status-connected: #22c55e;
      --status-connecting: #eab308;
      --status-disconnected: #ef4444;
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.42);
      --transition-snap: 0.05s ease-out;
      --transition-fade: 0.3s ease-in;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html {
      touch-action: manipulation;
    }

    body {
      background-color: var(--bg-body);
      height: 100svh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      gap: 8px;
      overscroll-behavior: none;
      -webkit-user-select: none;
    }

    .status-bar {
      flex: 0 0 auto;
      background-color: var(--bg-btn);
      border: var(--border-btn);
      border-radius: 24px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .presentation-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .connection {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      padding: 5px 10px 5px 8px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.04);
    }

    .connection-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .connection[data-state="connected"] .connection-dot { background: var(--status-connected); }
    .connection[data-state="connected"] .connection-label { color: var(--status-connected); }
    .connection[data-state="connecting"] .connection-dot {
      background: var(--status-connecting);
      animation: pulse 1s ease-in-out infinite;
    }
    .connection[data-state="connecting"] .connection-label { color: var(--status-connecting); }
    .connection[data-state="disconnected"] .connection-dot { background: var(--status-disconnected); }
    .connection[data-state="disconnected"] .connection-label { color: var(--status-disconnected); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .status-bottom {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slide-count {
      font-size: 13px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .slide-count strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 100px;
      transition: width 0.25s ease-out;
    }

    .remote-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 2fr 1fr;
      gap: 8px;
      width: 100%;
    }

    .btn {
      background-color: var(--bg-btn);
      border: var(--border-btn);
      border-radius: 24px;
      color: var(--color-idle);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      outline: none;
      transition: background var(--transition-fade), color var(--transition-fade), transform var(--transition-fade);
      will-change: background, color, transform;
    }

    .btn svg {
      width: 42px;
      height: 42px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform var(--transition-fade);
    }

    .btn:active {
      background-color: var(--bg-active);
      color: var(--color-active);
      transition: background var(--transition-snap), color var(--transition-snap), transform var(--transition-snap);
      transform: scale(0.98);
    }

    .btn:active svg {
      transform: scale(0.85);
      transition: transform var(--transition-snap);
    }

    .btn-up { grid-column: 1 / -1; grid-row: 1; }
    .btn-prev { grid-column: 1 / 2; grid-row: 2; }
    .btn-next { grid-column: 2 / -1; grid-row: 2; }
    .btn-down { grid-column: 1 / -1; grid-row: 3; }

    /* === GESTURE ANIMATION === */
    #gesture-canvas {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
    }
    #gesture-dot {
      position: fixed;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
      transition: opacity .15s ease, transform .15s ease;
      pointer-events: none;
      z-index: 10000;
      box-shadow: 0 0 30px rgba(59,130,246,0.5), 0 0 60px rgba(59,130,246,0.2);
    }
    #gesture-dot.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <div class="status-top">
      <span class="presentation-name" id="presentationName">Reveal Remote</span>
      <div class="connection" id="connectionBadge" data-state="disconnected">
        <span class="connection-dot"></span>
        <span class="connection-label" id="connectionLabel">Desconectado</span>
      </div>
    </div>
    <div class="status-bottom">
      <span class="slide-count"><strong id="currentSlide">-</strong>&nbsp;/&nbsp;<span id="totalSlides">-</span></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 4%;"></div>
    </div>
  </div>

  <canvas id="gesture-canvas"></canvas>
  <div id="gesture-dot"></div>

  <div class="remote-layout">
    <button class="btn btn-up" id="btnUp" aria-label="Arriba">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>
    <button class="btn btn-prev" id="btnPrev" aria-label="Anterior">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button class="btn btn-next" id="btnNext" aria-label="Siguiente">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <button class="btn btn-down" id="btnDown" aria-label="Abajo">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
  </div>

  <script>
    const els = {
      badge: document.getElementById('connectionBadge'),
      label: document.getElementById('connectionLabel'),
      current: document.getElementById('currentSlide'),
      total: document.getElementById('totalSlides'),
      progress: document.getElementById('progressFill')
    };

    const labels = {
      connected: 'Conectado',
      connecting: 'Conectando',
      disconnected: 'Desconectado'
    };

    let ws = null;
    let reconnectTimer = null;
    let current = 0;
    let total = 0;

    function setStatus(state) {
      els.badge.dataset.state = state;
      els.label.textContent = labels[state];
    }

    function updateSlide(index, totalSlides, fragment, totalFragments) {
      current = index;
      total = totalSlides;
      if (totalFragments && fragment) {
        els.current.textContent = index + '.' + fragment;
      } else {
        els.current.textContent = index || '-';
      }
      els.total.textContent = totalSlides || '-';
      let pct;
      if (totalFragments) {
        const slidePct = (fragment - 1) / totalFragments;
        pct = Math.max(4, Math.round(((index - 1 + slidePct) / totalSlides) * 100));
      } else {
        pct = totalSlides ? Math.max(4, Math.round((index / totalSlides) * 100)) : 4;
      }
      els.progress.style.width = pct + '%';
    }

    function connect() {
      setStatus('connecting');
      const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = proto + '//' + window.location.host;

      ws = new WebSocket(url);
      ws.onopen = () => {
        setStatus('connected');
        ws.send(JSON.stringify({ type: 'controller' }));
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };
      ws.onclose = () => {
        setStatus('disconnected');
        scheduleReconnect();
      };
      ws.onerror = () => ws.close();
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'slideInfo') {
            updateSlide(msg.index, msg.total, msg.fragment || 0, msg.totalFragments || 0);
          }
        } catch {}
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, 2000);
    }

    function send(action) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action }));
        navigator.vibrate && navigator.vibrate(12);
      }
    }

    function setupLongPress(id, action) {
      const el = document.getElementById(id);
      let timer = null, interval = null;

      function start() {
        send(action);
        timer = setTimeout(() => {
          interval = setInterval(() => send(action), 80);
        }, 300);
      }

      function stop() {
        if (timer) { clearTimeout(timer); timer = null; }
        if (interval) { clearInterval(interval); interval = null; }
      }

      el.addEventListener('pointerdown', start);
      el.addEventListener('pointerup', stop);
      el.addEventListener('pointerleave', stop);
      el.addEventListener('pointercancel', stop);
    }

    setupLongPress('btnUp', 'up');
    setupLongPress('btnDown', 'down');
    setupLongPress('btnPrev', 'left');
    setupLongPress('btnNext', 'right');

    (function() {
      const canvas = document.getElementById('gesture-canvas');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const dot = document.getElementById('gesture-dot');
      let points = [];
      let startX = 0, startY = 0;
      let active = false;
      let fadeAlpha = 0;
      let fadeId = null;

      function resize() {
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(dpr, dpr);
      }
      resize();
      window.addEventListener('resize', resize);

      function drawTrail() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        if (points.length < 2) return;

        const len = points.length;
        const last = points[len - 1];

        const left = [];
        const right = [];

        for (let i = 0; i < len; i++) {
          const p = points[i];
          const t = i / len;
          const w = Math.max(0.5, t * 8);

          let nx, ny;
          if (i === 0) {
            nx = points[1].x - p.x;
            ny = points[1].y - p.y;
          } else if (i === len - 1) {
            nx = p.x - points[i - 1].x;
            ny = p.y - points[i - 1].y;
          } else {
            nx = points[i + 1].x - points[i - 1].x;
            ny = points[i + 1].y - points[i - 1].y;
          }
          const d = Math.sqrt(nx * nx + ny * ny);
          if (d < 0.001) continue;
          const px = (-ny / d) * w;
          const py = (nx / d) * w;

          left.push(p.x + px, p.y + py);
          right.push(p.x - px, p.y - py);
        }

        if (left.length < 2) return;

        const rStart = Math.max(0.5, (0 / len) * 8);
        const rEnd = Math.max(0.5, ((len - 1) / len) * 8);
        const p0 = points[0];
        const pN = points[len - 1];

        ctx.save();

        // Glow pass
        ctx.shadowColor = 'rgba(59,130,246,0.35)';
        ctx.shadowBlur = 24;

        ctx.beginPath();
        ctx.moveTo(left[0], left[1]);
        for (let i = 2; i < left.length; i += 2) {
          ctx.lineTo(left[i], left[i + 1]);
        }
        for (let i = right.length - 2; i >= 0; i -= 2) {
          ctx.lineTo(right[i], right[i + 1]);
        }
        ctx.closePath();
        ctx.fillStyle = 'hsla(217, 91%, 55%, ' + (0.4 * fadeAlpha) + ')';
        ctx.fill();

        ctx.shadowBlur = 0;

        ctx.beginPath();
        ctx.arc(p0.x, p0.y, rStart, 0, Math.PI * 2);
        ctx.arc(pN.x, pN.y, rEnd, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(217, 91%, 55%, ' + (0.4 * fadeAlpha) + ')';
        ctx.fill();

        // Core pass
        ctx.beginPath();
        ctx.moveTo(left[0], left[1]);
        for (let i = 2; i < left.length; i += 2) {
          ctx.lineTo(left[i], left[i + 1]);
        }
        for (let i = right.length - 2; i >= 0; i -= 2) {
          ctx.lineTo(right[i], right[i + 1]);
        }
        ctx.closePath();
        ctx.fillStyle = 'hsla(217, 91%, 65%, ' + (0.7 * fadeAlpha) + ')';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p0.x, p0.y, rStart * 0.5, 0, Math.PI * 2);
        ctx.arc(pN.x, pN.y, rEnd * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(217, 91%, 65%, ' + (0.7 * fadeAlpha) + ')';
        ctx.fill();

        ctx.restore();

        if (active) {
          const dx = last.x - points[0].x;
          const dy = last.y - points[0].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 20) {
            const angle = Math.atan2(dy, dx);
            ctx.save();
            ctx.translate(last.x, last.y);
            ctx.rotate(angle - Math.PI / 2);

            ctx.shadowColor = 'rgba(59,130,246,0.5)';
            ctx.shadowBlur = 16;

            ctx.beginPath();
            ctx.moveTo(0, -12);
            ctx.lineTo(8, 10);
            ctx.lineTo(-8, 10);
            ctx.closePath();
            ctx.fillStyle = 'hsla(217, 91%, 60%, 0.8)';
            ctx.fill();

            ctx.shadowBlur = 0;

            ctx.beginPath();
            ctx.moveTo(0, -4);
            ctx.lineTo(3, 6);
            ctx.lineTo(-3, 6);
            ctx.closePath();
            ctx.fillStyle = 'hsla(217, 91%, 80%, 1)';
            ctx.fill();

            ctx.restore();
          }
        }
      }

      function startFadeOut() {
        fadeAlpha = 1;
        const startTime = performance.now();
        const duration = 500;

        function step(now) {
          const elapsed = now - startTime;
          fadeAlpha = Math.max(0, 1 - elapsed / duration);
          drawTrail();
          if (fadeAlpha > 0) {
            fadeId = requestAnimationFrame(step);
          } else {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            fadeId = null;
          }
        }
        if (fadeId) cancelAnimationFrame(fadeId);
        fadeId = requestAnimationFrame(step);
      }

      document.addEventListener('touchstart', (e) => {
        const x = e.touches[0].clientX;
        const y = e.touches[0].clientY;
        if (fadeId) { cancelAnimationFrame(fadeId); fadeId = null; }
        startX = x;
        startY = y;
        points = [{ x, y }];
        active = true;
        fadeAlpha = 1;
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
        dot.classList.add('visible');
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        if (!active) return;
        const x = e.touches[0].clientX;
        const y = e.touches[0].clientY;
        points.push({ x, y });
        if (points.length > 60) points.shift();
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
        drawTrail();
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        active = false;
        dot.classList.remove('visible');
        startFadeOut();

        const x = e.changedTouches[0].clientX;
        const y = e.changedTouches[0].clientY;
        const dx = x - startX;
        const dy = y - startY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < 50) return;

        if (absDx > absDy) {
          send(dx > 0 ? 'left' : 'right');
        } else {
          send(dy > 0 ? 'up' : 'down');
        }
      }, { passive: true });
    })();

    connect();
  </script>
</body>
</html>
